<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control NIDO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:Inter;
background:#eef2f8;
text-align:center;
margin:0;
}

.container{
max-width:420px;
margin:25px auto;
background:#fff;
padding:20px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

input,select{
width:90%;
padding:12px;
margin:6px 0;
border:1px solid #ccc;
border-radius:10px;
}

button{
width:100%;
padding:13px;
margin-top:10px;
border:none;
border-radius:10px;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.ingreso{background:#0b3d91;}
.salida{background:#c62828;}

.hidden{display:none;}
</style>
</head>

<body>

<div class="container">

<h2>Control NIDO</h2>

<select id="rol" onchange="mostrar()">
<option value="">Rol</option>
<option value="VISITANTE">VISITANTE</option>
<option value="CONTRATISTA">CONTRATISTA</option>
<option value="PROVEEDOR">PROVEEDOR</option>
</select>

<div id="form" class="hidden">

<input id="nombre" placeholder="Nombre">
<input id="tipoDoc" placeholder="Tipo doc">
<input id="documento" placeholder="Documento">
<input id="celular" placeholder="Celular">
<input id="entidad" placeholder="Entidad">
<input id="contacto" placeholder="Contacto emergencia">
<input id="parentesco" placeholder="Parentesco">
<input id="destino" placeholder="Destino">

</div>

<button class="ingreso hidden" id="btnIn" onclick="enviar('INGRESO')">INGRESO</button>
<button class="salida hidden" id="btnOut" onclick="enviar('SALIDA')">SALIDA</button>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxgDKfHUw-FGGefz98GUIYJJzeYgi6Vf6objs_SKt2bREY2cnDmiQFmt4AiZMeFf-QS/exec";

function mostrar(){

const rol = document.getElementById("rol").value;

document.getElementById("form").classList.toggle("hidden", !rol);
document.getElementById("btnIn").classList.toggle("hidden", !rol);

if(rol === "CONTRATISTA" || rol === "PROVEEDOR"){
document.getElementById("btnOut").classList.remove("hidden");
}else{
document.getElementById("btnOut").classList.add("hidden");
}

}

function enviar(tipo){

const data = {
tipo: tipo,
rol: document.getElementById("rol").value,
nombre: document.getElementById("nombre").value,
tipoDoc: document.getElementById("tipoDoc").value,
documento: document.getElementById("documento").value,
celular: document.getElementById("celular").value,
entidad: document.getElementById("entidad").value,
contactoEmergencia: document.getElementById("contacto").value,
parentesco: document.getElementById("parentesco").value,
destino: document.getElementById("destino").value
};

// 🔥 ENVÍO SIMPLE (SIN CORS PROBLEMS)
const params = new URLSearchParams(data).toString();

fetch(URL + "?" + params)
.then(() => {
alert(tipo + " registrado");
limpiar();
})
.catch(err => {
alert("Error al enviar");
console.log(err);
});

}

function limpiar(){
document.querySelectorAll("input").forEach(i=>i.value="");
document.getElementById("rol").value="";
document.getElementById("form").classList.add("hidden");
document.getElementById("btnIn").classList.add("hidden");
document.getElementById("btnOut").classList.add("hidden");
}

</script>

</body>
</html>
