<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Acceso NIDO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#e9eef5,#dfe7f1);
margin:0;
text-align:center;
}

.container{
background:white;
width:90%;
max-width:420px;
margin:25px auto;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

h2{ color:#0b3d91; }

input,select{
width:90%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ccc;
outline:none;
}

.btn{
width:100%;
padding:13px;
border:none;
border-radius:12px;
color:white;
cursor:pointer;
margin-top:10px;
font-weight:700;
}

.ingreso{ background:#0b3d91; }
.salida{ background:#c62828; }

.hidden{ display:none; }

#mensaje{
font-size:13px;
margin:10px 0;
color:#444;
font-weight:600;
}
</style>
</head>

<body>

<div class="container">

<h2>Control de Acceso NIDO</h2>

<div id="mensaje">Seleccione su rol</div>

<select id="rol" onchange="mostrarCampos()">
<option value="">Seleccione rol</option>
<option value="VISITANTE">VISITANTE</option>
<option value="CONTRATISTA">CONTRATISTA</option>
<option value="PROVEEDOR">PROVEEDOR</option>
</select>

<div id="form" class="hidden">

<input id="nombre" placeholder="Nombre completo">

<select id="tipoDoc">
<option value="">Tipo documento</option>
<option value="CC">Cédula</option>
<option value="TI">Tarjeta identidad</option>
<option value="CE">Extranjería</option>
<option value="PA">Pasaporte</option>
</select>

<input id="documento" placeholder="Número de documento">
<input id="celular" placeholder="Celular">
<input id="entidad" placeholder="Entidad a la que pertenece">
<input id="contacto" placeholder="Contacto emergencia">
<input id="parentesco" placeholder="Parentesco">
<input id="destino" placeholder="Lugar de destino">

</div>

<button class="btn ingreso hidden" id="btnIngreso" onclick="enviar(true)">INGRESO</button>
<button class="btn salida hidden" id="btnSalida" onclick="enviar(false)">SALIDA</button>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxgDKfHUw-FGGefz98GUIYJJzeYgi6Vf6objs_SKt2bREY2cnDmiQFmt4AiZMeFf-QS/exec";

/* =========================
   MOSTRAR CAMPOS
========================= */
function mostrarCampos(){

const rol = document.getElementById("rol").value;

const form = document.getElementById("form");
const btnIngreso = document.getElementById("btnIngreso");
const btnSalida = document.getElementById("btnSalida");

if(!rol){
form.classList.add("hidden");
btnIngreso.classList.add("hidden");
btnSalida.classList.add("hidden");
return;
}

form.classList.remove("hidden");
btnIngreso.classList.remove("hidden");

if(rol === "CONTRATISTA" || rol === "PROVEEDOR"){
btnSalida.classList.remove("hidden");
}else{
btnSalida.classList.add("hidden");
}

}

/* =========================
   OBTENER DATOS
========================= */
function getData(){
return {
rol: document.getElementById("rol").value,
nombre: document.getElementById("nombre").value,
tipoDoc: document.getElementById("tipoDoc").value,
documento: document.getElementById("documento").value,
celular: document.getElementById("celular").value,
entidad: document.getElementById("entidad").value,
contactoEmergencia: document.getElementById("contacto").value,
parentesco: document.getElementById("parentesco").value,
destino: document.getElementById("destino").value
};
}

/* =========================
   ENVIAR (INGRESO O SALIDA)
========================= */
async function enviar(esIngreso){

const data = getData();

if(!data.nombre || !data.documento){
alert("Complete los campos obligatorios");
return;
}

try{

await fetch(URL,{
method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(data)
});

if(esIngreso){
alert("Ingreso registrado correctamente");
}else{
alert("Salida registrada correctamente");
}

limpiar();

}catch(err){
alert("Error enviando datos");
console.log(err);
}

}

/* =========================
   LIMPIAR
========================= */
function limpiar(){

document.querySelectorAll("input").forEach(i=>i.value="");
document.getElementById("tipoDoc").value="";
document.getElementById("rol").value="";
document.getElementById("form").classList.add("hidden");
document.getElementById("btnIngreso").classList.add("hidden");
document.getElementById("btnSalida").classList.add("hidden");

}

</script>

</body>
</html>
