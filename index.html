<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Acceso NIDO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#e9eef5,#dfe7f1);
margin:0;
text-align:center;
}

.header{
background:white;
padding:10px 0;
border-bottom:2px solid #0b3d91;
}

.header img{
width:55%;
max-width:200px;
}

.container{
background:white;
width:90%;
max-width:420px;
margin:25px auto;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

h2{
color:#0b3d91;
margin-bottom:10px;
}

input,select{
width:90%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ccc;
outline:none;
}

.btn{
width:100%;
padding:13px;
border:none;
border-radius:12px;
color:white;
font-size:15px;
cursor:pointer;
margin-top:10px;
}

.ingreso{ background:#0b3d91; }
.salida{ background:#c62828; }

.hidden{ display:none; }

#mensaje{
font-size:13px;
margin:10px 0;
color:#444;
font-weight:600;
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/OB279U8.jpeg">
</div>

<div class="container">

<h2>Control de Acceso NIDO</h2>

<div id="mensaje">Complete los datos</div>

<select id="rol" onchange="mostrarCampos()">
<option value="">Seleccione rol</option>
<option value="VISITANTE">VISITANTE</option>
<option value="CONTRATISTA">CONTRATISTA</option>
<option value="PROVEEDOR">PROVEEDOR</option>
</select>

<div id="formulario" class="hidden">

<select id="tipoDoc">
<option value="">Tipo documento</option>
<option value="CC">Cédula</option>
<option value="TI">Tarjeta identidad</option>
<option value="CE">Extranjería</option>
<option value="PA">Pasaporte</option>
</select>

<input id="documento" placeholder="Documento">
<input id="nombre" placeholder="Nombre completo">
<input id="celular" placeholder="Celular">
<input id="entidad" placeholder="Entidad">
<input id="contacto" placeholder="Contacto emergencia">
<input id="parentesco" placeholder="Parentesco">
<input id="destino" placeholder="Lugar de destino">

</div>

<button class="btn ingreso hidden" id="btnIngreso" onclick="enviarIngreso()">INGRESO</button>
<button class="btn salida hidden" id="btnSalida" onclick="enviarSalida()">SALIDA</button>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby85sS5KDcft0wkf82n_jr3RPRMDRNR7-RRd3vb6ouF/dev";

/* MOSTRAR CAMPOS */
function mostrarCampos(){

document.getElementById("formulario").classList.remove("hidden");
document.getElementById("btnIngreso").classList.remove("hidden");

const rol = document.getElementById("rol").value;

if(rol === "CONTRATISTA" || rol === "PROVEEDOR"){
document.getElementById("btnSalida").classList.remove("hidden");
}else{
document.getElementById("btnSalida").classList.add("hidden");
}

}

/* OBTENER DATOS */
function datos(){

return {
rol: document.getElementById("rol").value,
tipoDoc: document.getElementById("tipoDoc").value,
documento: document.getElementById("documento").value,
nombre: document.getElementById("nombre").value,
celular: document.getElementById("celular").value,
entidad: document.getElementById("entidad").value,
contactoEmergencia: document.getElementById("contacto").value,
parentesco: document.getElementById("parentesco").value,
destino: document.getElementById("destino").value
};

}

/* INGRESO */
async function enviarIngreso(){

const d = datos();

await fetch(URL,{
method:"POST",
headers:{
  "Content-Type":"application/json"
},
body: JSON.stringify(d)
});

alert("Ingreso registrado");
}
/* SALIDA */
async function enviarSalida(){

const d = datos();

await fetch(URL,{
method:"POST",
headers:{
  "Content-Type":"application/json"
},
body: JSON.stringify(d)
});

alert("Salida registrada");
}

limpiar();

}

/* LIMPIAR */
function limpiar(){

document.querySelectorAll("input").forEach(i=>i.value="");
document.getElementById("tipoDoc").value="";
document.getElementById("rol").value="";
document.getElementById("formulario").classList.add("hidden");
document.getElementById("btnIngreso").classList.add("hidden");
document.getElementById("btnSalida").classList.add("hidden");

}

</script>

</body>
</html>
